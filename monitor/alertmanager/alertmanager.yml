global:
  resolve_timeout: 5m

route:
  receiver: telegram

  group_by:
    - alertname
    - instance

  group_wait: 10s
  group_interval: 30s
  repeat_interval: 5m

receivers:

- name: telegram

  telegram_configs:

  - bot_token: "YOUR_TOKEN"
    chat_id: YOUR_CHAT_ID
    parse_mode: Markdown
    send_resolved: true