global:
  resolve_timeout: 5m

route:
  receiver: telegram

  group_by:
    - alertname
    - instance

  group_wait: 10s
  group_interval: 30s
  repeat_interval: 5m

receivers:

- name: telegram

  telegram_configs:

  - bot_token: "YOUR_TOKEN"
    chat_id: YOUR_CHAT_ID
    parse_mode: HTML
    send_resolved: true
    message: |-
      {{ if eq .Status "firing" }}🚨 <b>INFRASTRUCTURE ALERT</b>{{ else }}✅ <b>ALERT RESOLVED</b>{{ end }}
      ━━━━━━━━━━━━━━━━━━━━━━━━
      {{ range .Alerts -}}
      🖥  <b>Server</b>    :  <code>{{ .Labels.job }}</code>
      {{ if eq .Labels.severity "critical" }}🔴{{ else }}🟡{{ end }}  <b>Severity</b>  :  {{ .Labels.severity | title }}

      📋  <b>{{ .Annotations.summary }}</b>
      📝  {{ .Annotations.description }}
      {{ end -}}
      ━━━━━━━━━━━━━━━━━━━━━━━━
      {{ if eq .Status "resolved" }}🕐  Resolved: {{ (index .Alerts 0).EndsAt.Local.Format "02 Jan 2006, 15:04 WIB" }}{{ else }}🕐  Fired: {{ (index .Alerts 0).StartsAt.Local.Format "02 Jan 2006, 15:04 WIB" }}{{ end }}

# =====================================================
# INHIBIT RULES
# Jika server DOWN (NodeDown), jangan kirim alert resource
# (CPU/Memory/Disk/dll) untuk server yang sama. Mencegah
# "alert storm" saat satu server mati.
# =====================================================
inhibit_rules:
  - source_match:
      alertname: NodeDown
    target_match_re:
      alertname: "HighCPUUsage|HighMemoryUsage|HighDiskUsage|HighLoad|HighNetworkTraffic|HighDiskIOWait"
    equal:
      - instance
